<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- calm blue gradient -->
    <linearGradient id="waterPlannedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- highlight -->
    <radialGradient id="plannedHighlight" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->


  <!-- centered drop -->
  <g transform="translate(300,100) scale(0.22) translate(-512,-512)">

    <!-- DROP -->
    <path d="M664.2 596.1c0 163.1-92.6 229.9-206.7 229.9s-206.7-66.8-206.7-229.9 206.7-426.2 206.7-426.2S664.2 433 664.2 596.1z"
          fill="url(#waterPlannedGrad)"/>

    <!-- highlight -->
    <ellipse cx="430" cy="420" rx="60" ry="120"
             fill="url(#plannedHighlight)"/>

    <!-- CLOCK ICON -->
    <g transform="translate(457,600)">
      <!-- outer circle -->
      <circle r="55" fill="white" opacity="0.9"/>

      <!-- inner clock -->
      <circle r="45" fill="#0EA5E9"/>

      <!-- hands -->
      <line x1="0" y1="0" x2="0" y2="-20"
            stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="15" y2="10"
            stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>

  </g>
</svg>