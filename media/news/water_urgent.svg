<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- red-blue mix gradient -->
    <linearGradient id="waterUrgentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="40%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- highlight -->
    <radialGradient id="urgentHighlight" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>




  <!-- centered drop -->
  <g transform="translate(300,100) scale(0.22) translate(-512,-512)">

    <!-- DROP -->
    <path d="M664.2 596.1c0 163.1-92.6 229.9-206.7 229.9s-206.7-66.8-206.7-229.9 206.7-426.2 206.7-426.2S664.2 433 664.2 596.1z"
          fill="url(#waterUrgentGrad)"/>

    <!-- highlight -->
    <ellipse cx="430" cy="420" rx="60" ry="120"
             fill="url(#urgentHighlight)"/>

    <!-- EXCLAMATION MARK -->
    <g transform="translate(457,580)">
      <rect x="-12" y="-120" width="24" height="80" rx="10"
            fill="white"/>
      <circle cx="0" cy="10" r="12" fill="white"/>
    </g>

  </g>
</svg>