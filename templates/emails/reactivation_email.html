{% extends "emails/base_email.html" %}

{% block content %}
<h2>Реактивация на профил</h2>

<p>
Вашият профил беше деактивиран.
Ако желаете да го активирате отново,
използвайте следния код:
</p>

<h3 style="letter-spacing:3px;">
    {{ code }}
</h3>

<p>
Кодът е валиден до {{ expires }}.
</p>

<p>
Ако не сте заявявали реактивация,
игнорирайте този имейл.
</p>
{% endblock %}
