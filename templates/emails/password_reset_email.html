{% extends "emails/base_email.html" %}

{% block content %}

<p>Здравейте <strong>{{ user.full_name }}</strong>,</p>

<p>Получихме заявка за смяна на парола.</p>

<p>Вашият код за потвърждение е:</p>

<div style="
    background:#e3f2fd;
    border:1px solid #bbdefb;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    letter-spacing:4px;
    color:#1565c0;
    border-radius:12px;
    margin:20px 0;
">
    {{ code }}
</div>

<p>Кодът е валиден 10 минути.</p>

{% endblock %}
