<div class="enterprise-helpbot-widget" id="enterpriseHelpbotWidget" aria-label="Enterprise help bot">
    <div class="enterprise-helpbot-drawer">

        <button id="enterpriseHelpbotToggle" type="button" aria-label="Enterprise Help" title="Enterprise Help">
            <span class="enterprise-helpbot-arrow">❯</span>

            <img src="/media/buttons/help_bot.png"
                 alt="Помощник"
                 class="enterprise-helpbot-logo">

            <span class="enterprise-helpbot-toggle-text">
                Help Bot
            </span>
        </button>

        <div id="enterpriseHelpbotPanel" aria-hidden="true">

            <div class="enterprise-helpbot-head">

                <button type="button"
                        id="enterpriseHelpbotBack"
                        class="enterprise-helpbot-back"
                        hidden>
                    ← Назад
                </button>

                <div>
                    <div class="enterprise-helpbot-title"
                         id="enterpriseHelpbotTitle">
                        Център за помощ
                    </div>

                    <div class="enterprise-helpbot-subtitle"
                         id="enterpriseHelpbotSubtitle">
                        Изберете секция или напишете ключова дума.
                    </div>

                    <div class="enterprise-helpbot-lang-switch">

                        <button type="button"
                                class="enterprise-helpbot-lang-btn active"
                                data-lang="bg">
                            BG
                        </button>

                        <button type="button"
                                class="enterprise-helpbot-lang-btn"
                                data-lang="en">
                            EN
                        </button>

                    </div>
                </div>

            </div>

            <div class="enterprise-helpbot-search-wrap">

                <input id="enterpriseHelpbotSearch"
                       class="enterprise-helpbot-search"
                       type="text"
                       placeholder="Напишете: сигнал, статус, карта, новини..."
                       autocomplete="off">

                <button type="button"
                        id="enterpriseHelpbotSearchBtn"
                        class="enterprise-helpbot-search-btn">
                    Търси
                </button>

            </div>

            <ul class="enterprise-helpbot-list"
                id="enterpriseHelpbotList"></ul>

            <div class="enterprise-helpbot-answer"
                 id="enterpriseHelpbotAnswer"
                 hidden></div>

            <a href="{% url 'contact' %}"
               class="enterprise-helpbot-contact-link"
               id="enterpriseHelpbotContact">
                Свържете се с екип
            </a>

        </div>
    </div>
</div>

<style>

    gap:6px;

    border-radius:8px;

    font-size:11px;
    font-weight:700;

    cursor:pointer;

    transition:
        background .2s ease,
        border-color .2s ease,
        transform .2s ease;
}

.enterprise-helpbot-lang-btn:hover{
    background:rgba(255,255,255,.12);
    transform:translateY(-1px);
}

.enterprise-helpbot-lang-btn.active{
    background:linear-gradient(
        135deg,
        #2563eb,
        #38bdf8
    );

    border-color:rgba(255,255,255,.5);
}
/* =========================================================
   MAIN WIDGET POSITION
========================================================= */

.enterprise-helpbot-widget{
    position: fixed;

    /* ТОЧНО ПОД ПРЕВОДА */
    top: 178px;
    right: 0;

    z-index: 9998;
    font-family: inherit;
}

/* =========================================================
   DRAWER
========================================================= */

.enterprise-helpbot-drawer{
    width: 58px;
    max-height: 54px;
    overflow: hidden;

    border-radius: 16px 0 0 16px;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(26px) saturate(180%);

    border: 1px solid rgba(255,255,255,0.35);

    box-shadow:
        0 25px 60px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.5);

    color: #ffffff;

    transition:
        width .28s ease,
        max-height .32s ease,
        box-shadow .25s ease,
        transform .25s ease;

    position: relative;
}

.enterprise-helpbot-drawer::before{
    content:"";
    position:absolute;
    inset:0;

    background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05) 40%,

    );

    pointer-events:none;
}

.enterprise-helpbot-drawer:hover{
    transform: translateY(-3px) scale(1.02);

}

.enterprise-helpbot-widget.open .enterprise-helpbot-drawer{

        inset 0 1px 0 rgba(255,255,255,0.7);
}

.enterprise-helpbot-drawer,
.enterprise-helpbot-drawer *{
    text-shadow:
        0 1px 2px rgba(0,0,0,0.4),
        0 2px 6px rgba(0,0,0,0.2);
}

/* =========================================================
   TOGGLE BUTTON
========================================================= */

#enterpriseHelpbotToggle{
    width: 100%;
    min-height: 54px;

    border: 0;
    background: transparent;
    color: inherit;

    cursor: pointer;

    display: flex;
    align-items: center;
    gap: 8px;

    padding: 0 14px;

    text-align: left;
}

#enterpriseHelpbotToggle:hover{
    background: rgba(148,163,184,0.14);
}

.enterprise-helpbot-arrow{
    font-size: 14px;
    opacity: .95;

    transform: translateX(0) rotate(0deg);
    transition: transform .3s ease;
}

.enterprise-helpbot-widget.open .enterprise-helpbot-arrow{
    transform: translateX(2px) rotate(180deg);
}

.enterprise-helpbot-logo{
    width: 22px;
    height: 22px;

    object-fit: contain;

    border-radius: 50%;
    background: #fff;
    padding: 2px;
}

.enterprise-helpbot-toggle-text{
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .01em;

    opacity: 0;
    transform: translateX(4px);

    transition:
        opacity .2s ease,
        transform .24s ease;

    white-space: nowrap;
}

.enterprise-helpbot-widget.open .enterprise-helpbot-toggle-text{
    opacity: 1;
    transform: translateX(0);
}

/* =========================================================
   PANEL
========================================================= */

#enterpriseHelpbotPanel{

    padding: 12px;

    opacity: 0;
    transform: translateY(-8px);

    transition:
        opacity .22s ease,
        transform .22s ease;
}

.enterprise-helpbot-widget.open #enterpriseHelpbotPanel{
    opacity: 1;
    transform: translateY(0);
}

   HEADER
========================================================= */

.enterprise-helpbot-back{

.enterprise-helpbot-title{

.enterprise-helpbot-subtitle{

/* =========================================================
   SEARCH
========================================================= */

    margin-bottom:12px;
}

.enterprise-helpbot-search{

}

.enterprise-helpbot-search::placeholder{

}

.enterprise-helpbot-search-btn{

    border-radius:10px;

    background: rgba(0,0,0,.22);

    color:#ffffff;

    padding:8px 12px;

    cursor:pointer;
    font-weight:700;

    transition:

        border-color .2s ease;
}

.enterprise-helpbot-search-btn:hover{
    background: rgba(0,0,0,.30);
    border-color: rgba(255,255,255,.5);
}

/* =========================================================
   LIST
========================================================= */

.enterprise-helpbot-list{
    list-style:none;
    margin:0;
    padding:0;

    display:grid;
    gap:8px;
}

.enterprise-helpbot-item{
    width:100%;

    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;

    background: rgba(0,0,0,0.18);

    color:#f8fafc;

    text-align:left;

    padding:9px 10px;

    font-size:13px;
    line-height:1.35;

    cursor:pointer;

.enterprise-helpbot-item:hover{
    background: rgba(0,0,0,0.28);

    border-color: rgba(255,255,255,0.45);

    transform: translateX(-2px);
}

/* =========================================================
   ANSWER BOX
========================================================= */

    from{

        transform:translateY(6px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.enterprise-helpbot-answer{

    border-radius:14px;

    background:

            rgba(30,58,95,.95),
            rgba(37,99,235,.88)

    color:#f8fafc;

    padding:14px;

    line-height:1.6;

    box-shadow:

/* =========================================================
   CONTACT
========================================================= */

    align-items:center;

    padding:12px 14px;

    border-radius:12px;

    background: linear-gradient(

/* =========================================================
   MOBILE
========================================================= */

@media (max-width: 640px){

    .enterprise-helpbot-widget{
        top: 175px;
        right: 0;
    }

    .enterprise-helpbot-widget.open .enterprise-helpbot-drawer{
        width: min(92vw, 360px);
    }

}

}

            { words: ['map', 'filter', 'marker'], target: 'map' },
            { words: ['news', 'repair', 'outage'], target: 'news' },
            { words: ['role', 'access', 'account', 'login'], target: 'account' },
            { words: ['contact', 'support', 'team'], target: 'contact' },
            { words: ['faq', 'question'], target: 'faq' }
        ]
    };

    // =========================================================
    // APPLY UI LANGUAGE
    // =========================================================

    searchInput.placeholder =
        uiText[currentLang].searchPlaceholder;

    searchBtn.textContent =
        uiText[currentLang].searchButton;

    contactBtn.textContent =
        uiText[currentLang].contactButton;

    // =========================================================
    // BOT RENDERING
    // =========================================================

    const history = [];
    let current = 'root';

    function render(nodeKey) {

        const node = data[currentLang][nodeKey];
        if (!node) return;

        current = nodeKey;
        updateLanguageButtons();

        titleEl.textContent = node.title;
        subtitleEl.textContent = node.subtitle;

        backBtn.hidden = history.length === 0;

        listEl.innerHTML = '';

        answerEl.hidden = true;
        answerEl.textContent = '';

        node.items.forEach(function (item) {

            const li = document.createElement('li');

            const btn = document.createElement('button');

            btn.type = 'button';
            btn.className = 'enterprise-helpbot-item';
            btn.textContent = item.label;

            btn.addEventListener('click', function () {

                if (item.goto) {

                    history.push(current);
                    render(item.goto);
                    return;
                }

                if (item.answer) {

                    answerEl.textContent = item.answer;
                    answerEl.hidden = false;
                }
            });

            li.appendChild(btn);
            listEl.appendChild(li);
        });
    }

    // =========================================================
    // SEARCH
    // =========================================================

    function runSearch() {

        const query =
            (searchInput.value || '')
            .trim()
            .toLowerCase();

        if (!query) return;

        const match =
            keywordMap[currentLang]
            .find(function (entry) {

                return entry.words.some(function (word) {
                    return query.includes(word);
                });
            });

        if (match) {

            history.push(current);

            render(match.target);

            answerEl.textContent =
                uiText[currentLang].searchMatch +
                ' ' +
                data[currentLang][match.target].title;

            answerEl.hidden = false;

        } else {

            answerEl.textContent =
                uiText[currentLang].noResult;

            answerEl.hidden = false;
        }
    }

    // =========================================================
    // EVENTS
    // =========================================================

    toggle.addEventListener('click', function () {

        searchInput.placeholder =
            uiText[currentLang].searchPlaceholder;

        searchBtn.textContent =
            uiText[currentLang].searchButton;

        contactBtn.textContent =
            uiText[currentLang].contactButton;

        render(current);

        const isOpen =
            widget.classList.toggle('open');

        panel.setAttribute(
            'aria-hidden',
            isOpen ? 'false' : 'true'
        );

        if (isOpen) {
            searchInput.focus();
        }

    });

    backBtn.addEventListener('click', function () {

        if (!history.length) return;

        const prev = history.pop();
        render(prev);
    });

    searchBtn.addEventListener('click', runSearch);

    searchInput.addEventListener('keydown', function (event) {

        if (event.key === 'Enter') {
            runSearch();
        }
    });

    document.addEventListener('click', function (event) {

        if (!widget.classList.contains('open')) return;

        const clickedInside =
            event.target.closest('#enterpriseHelpbotWidget');

        if (!clickedInside) {

            widget.classList.remove('open');

            panel.setAttribute(
                'aria-hidden',
                'true'
            );
        }

    }, true);

    // =========================================================
    // INIT
    // =========================================================

    langButtons.forEach(function(btn){

        btn.addEventListener('click', function(){

            currentLang = btn.dataset.lang;

            localStorage.setItem(
                'enterprise_helpbot_lang',
                currentLang
            );

            searchInput.placeholder =
                uiText[currentLang].searchPlaceholder;

            searchBtn.textContent =
                uiText[currentLang].searchButton;

            contactBtn.textContent =
                uiText[currentLang].contactButton;

            render(current);

        });

    });
    render('root');

})();
</script>
